<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background-color: #030305;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
      overflow: hidden;
    }
    .container {
      position: relative;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      background: radial-gradient(circle, #08090f 0%, #030305 100%);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
      cursor: grab;
      touch-action: none;
    }
    canvas:active {
      cursor: grabbing;
    }
    /* Sleek UI Controls Overlaid on Canvas */
    .zoom-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .zoom-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(20, 22, 35, 0.7);
      border: 1px solid rgba(235, 40, 40, 0.3);
      color: #ff4d4d;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .zoom-btn:hover {
      background: rgba(235, 40, 40, 0.2);
      border-color: #ff4d4d;
      box-shadow: 0 0 10px rgba(235, 40, 40, 0.4);
    }
    .zoom-btn:active {
      transform: scale(0.95);
    }
    .info {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      color: #5f6e85;
      font-size: 11px;
      letter-spacing: 2px;
      pointer-events: none;
      line-height: 1.5;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="container" style="display: flex; flex-direction: column; align-items: center;">
  
  <!-- Minimalist Top Planet Label -->
  <div style="color: #ff4d4d; font-size: 1.1rem; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; text-shadow: 0 0 10px rgba(235, 40, 40, 0.3);">
    SYSTEM VISUALIZATION: TrES-2b
  </div>

  <!-- Wrapper gives absolute items an isolated home -->
  <div style="position: relative; margin-bottom: 20px;">
    <canvas id="spaceCanvas" width="650" height="500"></canvas>
    
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn" title="Zoom In">+</button>
      <button class="zoom-btn" id="zoomOut" title="Zoom Out">−</button>
    </div>
    
    <div class="info">Drag to rotate system • Scroll or use buttons to zoom</div>
  </div>

  <!-- Minimalist Bottom Fields Safely Separated Below canvas bounds -->
  <div style="font-family: monospace; font-size: 0.85rem; letter-spacing: 1px; line-height: 1.6; color: #5f6e85; text-transform: uppercase; text-align: center; margin-top: 10px;">
    <div>PROPERTY OF: <span style="color: #d1d9e6; font-weight: bold;">THE MOORE SIGNAL ARCHIVE LLC</span></div>
    <div style="font-size: 0.75rem; color: #434f63; margin-top: 4px;">Conceived by Angela N. Moore • Co-Engineered with AI Systems</div>
  </div>
  
</div>

<script>
  const canvas = document.getElementById('spaceCanvas');
  const ctx = canvas.getContext('2d');

  // Background Stars Setup
  const stars = [];
  for(let i=0; i<120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5,
      alpha: Math.random() * 0.5 + 0.3
    });
  }

  // System Core Positions (Scientifically Accurate Scales/Labels)
  // Host Star: TrES-2A (Yellowish-main sequence star, G-type like our Sun)
  const starX = 80;
  const starY = 120;
  const starRadius = 55;

  // Planet placement properties (Centered on canvas)
  const planetX = canvas.width / 2 + 40;
  const planetY = canvas.height / 2 + 20;
  let radius = 100; // Base Zoom scale
  
  // Interactive Direction Variables
  let rotX = 0; 
  let rotY = 0; 
  
  let isDragging = false;
  let lastX = 0;
  let lastY = 0;

  // Render Loop
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Background Stars
    stars.forEach(star => {
      ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
      ctx.fillRect(star.x, star.y, star.size, star.size);
    });

    // 2. Draw Scientific Fact HUD Text in Background
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = 'rgba(235, 40, 40, 0.4)';
    ctx.fillText('// EXOPLANET PROFILE: TrES-2b', 40, 45);
    
    // Spaced out to leave clear breathing room above the lower "info" text overlay
    ctx.font = '12px sans-serif';
    ctx.fillStyle = 'rgba(122, 136, 155, 0.6)';
    ctx.fillText('ALBEDO: < 1% (Darker than coal/acrylic paint)', 40, 395);
    ctx.fillText('ORBITAL PERIOD: 2.47 Days (Extremely fast)', 40, 417);
    ctx.fillText('SYSTEM DISTANCE: ~750 Light Years away', 40, 439);

    // 3. Draw Host Star (TrES-2A) in top left background
    // Star Glow
    let starGlow = ctx.createRadialGradient(starX, starY, starRadius - 15, starX, starY, starRadius + 60);
    starGlow.addColorStop(0, 'rgba(255, 220, 120, 0.25)');
    starGlow.addColorStop(0.4, 'rgba(255, 140, 50, 0.08)');
    starGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = starGlow;
    ctx.beginPath();
    ctx.arc(starX, starY, starRadius + 60, 0, Math.PI * 2);
    ctx.fill();

    // Star Body
    let starBody = ctx.createRadialGradient(starX - 10, starY - 10, 2, starX, starY, starRadius);
    starBody.addColorStop(0, '#ffffff');
    starBody.addColorStop(0.2, '#fff3cc');
    starBody.addColorStop(0.8, '#ffcc66');
    starBody.addColorStop(1, '#ff9933');
    ctx.fillStyle = starBody;
    ctx.beginPath();
    ctx.arc(starX, starY, starRadius, 0, Math.PI * 2);
    ctx.fill();

    // Label for Host Star
    ctx.font = '9px monospace';
    ctx.fillStyle = 'rgba(255, 200, 100, 0.5)';
    ctx.fillText('HOST STAR: TrES-2A', starX - 45, starY + starRadius + 18);

    // 4. Planet Outer Atmosphere Glow (Scales with radius zoom)
    let outerGlow = ctx.createRadialGradient(planetX, planetY, radius - 10, planetX, planetY, radius + 20);
    outerGlow.addColorStop(0, 'rgba(235, 40, 40, 0.07)');
    outerGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(planetX, planetY, radius + 20, 0, Math.PI * 2);
    ctx.fill();

    // 5. Solid Pitch-Black Planet Surface
    ctx.fillStyle = '#060608'; 
    ctx.beginPath();
    ctx.arc(planetX, planetY, radius, 0, Math.PI * 2);
    ctx.fill();

    // 6. Draw Gas Bands Warping Into 3D Curves Based on Drag Direction
    ctx.save();
    ctx.beginPath();
    ctx.arc(planetX, planetY, radius, 0, Math.PI * 2);
    ctx.clip();

    let tiltFactor = Math.sin(rotY * 0.02); 
    const bandPositions = [-45, -15, 15, 45]; // Added an extra band for denser detail
    
    bandPositions.forEach((baseY, index) => {
      // Alternate band directions and speeds to make friction highly visible
      let speedMultiplier = (index % 2 === 0) ? 1.4 : -0.9;
      let xOffset = ((rotX * speedMultiplier) % (radius * 4)) - (radius * 2);
      let currentCenterY = planetY + (baseY * Math.cos(rotY * 0.02)) + (radius * 0.4 * tiltFactor);

      for (let i = 0; i < 3; i++) {
        let drawX = planetX + xOffset + (i * radius * 3.5) - (radius * 3.5);
        
        ctx.beginPath();
        ctx.ellipse(drawX, currentCenterY, radius * 1.4, Math.abs(radius * 0.22 * tiltFactor) + 12, rotY * 0.01, 0, Math.PI * 2);
        
        // BOOSTED GRADIENT: Richer dark red cores with stronger outer neon-red boundaries
        let bandGradient = ctx.createRadialGradient(drawX, currentCenterY, 2, drawX, currentCenterY, radius * 1.2);
        bandGradient.addColorStop(0, 'rgba(255, 15, 15, 0.45)');  // Bright, hot thermal core
        bandGradient.addColorStop(0.3, 'rgba(210, 10, 10, 0.35)'); // Rich Crimson middle
        bandGradient.addColorStop(0.7, 'rgba(130, 0, 0, 0.15)');    // Visible red edge bleed
        bandGradient.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.fillStyle = bandGradient;
        ctx.fill();
      }
    });

    // BONUS VISUAL ANCHOR: Fine atmospheric storms that slide perfectly on the Y-axis
    // This guarantees that vertical dragging looks incredibly active and reactive
    ctx.fillStyle = 'rgba(240, 20, 20, 0.18)';
    for(let j = 0; j < 4; j++) {
      let stormX = planetX + Math.sin(rotX * 0.01 + j) * (radius * 0.5);
      let stormY = planetY + Math.cos(rotY * 0.01 + j) * (radius * 0.6) + (rotY * 0.15 % (radius * 2)) - radius;
      if (Math.hypot(stormX - planetX, stormY - planetY) < radius - 10) {
        ctx.beginPath();
        ctx.arc(stormX, stormY, 4 + j, 0, Math.PI * 2);
        ctx.fill();
      }
    }


    // 7. 3D Spherical Shadow Mask Overlay (Simulates light cast directly from TrES-2A)
    // Points the light source angle right at the coordinates of our top-left star!
    let shadow = ctx.createRadialGradient(planetX - (radius * 0.35), planetY - (radius * 0.35), radius * 0.1, planetX, planetY, radius);
    shadow.addColorStop(0, 'rgba(255, 240, 200, 0.04)'); // Faint stellar light hit on edge facing star
    shadow.addColorStop(0.3, 'rgba(0, 0, 0, 0.3)');
    shadow.addColorStop(0.95, 'rgba(0, 0, 0, 0.99)'); // Absolute blackness matching TrES-2b profile
    
    ctx.fillStyle = shadow;
    ctx.beginPath();
    ctx.arc(planetX, planetY, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    requestAnimationFrame(draw);
  }

  // --- Zoom Logic Function ---
  function adjustZoom(amount) {
    radius = Math.min(Math.max(radius + amount, 45), 180);
  }

  // Button Listeners
  document.getElementById('zoomIn').addEventListener('click', () => adjustZoom(15));
  document.getElementById('zoomOut').addEventListener('click', () => adjustZoom(-15));

  // Wheel Listener
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (e.deltaY < 0) adjustZoom(6);
    else adjustZoom(-6);
  }, { passive: false });

    // Multi-Direction Drag Listeners
  function startDrag(e) {
    isDragging = true;
    if (e.touches && e.touches.length > 0) {
      lastX = e.touches.clientX;
      lastY = e.touches.clientY;
    } else {
      lastX = e.clientX;
      lastY = e.clientY;
    }
  }

  function doDrag(e) {
    if (!isDragging) return;
    
    let currentX, currentY;
    if (e.touches && e.touches.length > 0) {
      currentX = e.touches.clientX;
      currentY = e.touches.clientY;
    } else {
      currentX = e.clientX;
      currentY = e.clientY;
    }
    
    const deltaX = currentX - lastX;
    const deltaY = currentY - lastY;
    
    rotX += deltaX * 0.5; 
    rotY += deltaY * 0.5; 
    
    lastX = currentX;
    lastY = currentY;
  }

  function stopDrag() {
    isDragging = false;
  }

  // Bind All Interaction Hooks Directly to Canvas
  canvas.addEventListener('mousedown', startDrag);
  canvas.addEventListener('mousemove', doDrag);
  canvas.addEventListener('mouseup', stopDrag);
  canvas.addEventListener('mouseleave', stopDrag);

  canvas.addEventListener('touchstart', startDrag, { passive: true });
  canvas.addEventListener('touchmove', doDrag, { passive: true });
  canvas.addEventListener('touchend', stopDrag);

  // Initialize display engine loop
  draw();
</script>

</body>
</html>
